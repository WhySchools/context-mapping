<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">context-gen mindmap</title>
  <desc id="desc">A mindmap summarizing context-gen purpose, contracts, architecture, parser plugins, agent workflow, design decisions, known gaps, and operations.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .root { fill: #172033; stroke: #172033; }
      .branch { fill: #ffffff; stroke-width: 2.5; }
      .leaf { fill: #ffffff; stroke-width: 1.6; }
      .line { fill: none; stroke-width: 2.2; stroke-linecap: round; }
      .label-root { fill: #ffffff; font: 700 30px Arial, sans-serif; }
      .label-branch { fill: #172033; font: 700 18px Arial, sans-serif; }
      .label-leaf { fill: #2f3b52; font: 14px Arial, sans-serif; }
      .small { fill: #5b667a; font: 12px Arial, sans-serif; }
      .blue { stroke: #2f80ed; }
      .green { stroke: #27ae60; }
      .orange { stroke: #f2994a; }
      .purple { stroke: #9b51e0; }
      .red { stroke: #eb5757; }
      .teal { stroke: #00a6a6; }
      .gold { stroke: #b88700; }
      .slate { stroke: #64748b; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1050"/>

  <g transform="translate(800 525)">
    <ellipse class="root" rx="130" ry="58"/>
    <text class="label-root" text-anchor="middle" y="-6">context-gen</text>
    <text class="small" fill="#d9e2f2" text-anchor="middle" y="22">AST context maps + human intent</text>
  </g>

  <!-- Main connector lines -->
  <path class="line blue" d="M 690 495 C 535 420, 435 270, 300 170"/>
  <path class="line green" d="M 675 525 C 520 510, 420 455, 285 410"/>
  <path class="line orange" d="M 690 560 C 525 635, 435 780, 300 890"/>
  <path class="line purple" d="M 910 495 C 1060 420, 1165 260, 1300 160"/>
  <path class="line teal" d="M 925 525 C 1075 520, 1175 480, 1320 430"/>
  <path class="line red" d="M 910 560 C 1060 635, 1165 780, 1300 900"/>
  <path class="line gold" d="M 800 467 C 800 365, 800 245, 800 145"/>
  <path class="line slate" d="M 800 583 C 800 700, 800 805, 800 925"/>

  <!-- Purpose -->
  <g>
    <rect class="branch blue" x="120" y="110" rx="12" ry="12" width="360" height="54"/>
    <text class="label-branch" x="300" y="143" text-anchor="middle">Purpose</text>
    <path class="line blue" d="M 300 164 V 205"/>
    <rect class="leaf blue" x="100" y="205" rx="10" ry="10" width="400" height="122"/>
    <text class="label-leaf" x="125" y="235">• Generate AST-based context maps</text>
    <text class="label-leaf" x="125" y="262">• Reduce prompt/token budget</text>
    <text class="label-leaf" x="125" y="289">• Preserve design intent in [manual]</text>
    <text class="label-leaf" x="125" y="316">• Help agents avoid guessing from code alone</text>
  </g>

  <!-- Context Files -->
  <g>
    <rect class="branch green" x="95" y="365" rx="12" ry="12" width="380" height="54"/>
    <text class="label-branch" x="285" y="398" text-anchor="middle">Context Files</text>
    <path class="line green" d="M 285 419 V 460"/>
    <rect class="leaf green" x="70" y="460" rx="10" ry="10" width="430" height="170"/>
    <text class="label-leaf" x="95" y="490">• .context/*.md</text>
    <text class="label-leaf" x="120" y="517">- [auto]: generated facts from source</text>
    <text class="label-leaf" x="120" y="544">- [manual]: decisions, invariants, intent</text>
    <text class="label-leaf" x="95" y="578">• GLOBAL.md: first file agents read</text>
    <text class="label-leaf" x="95" y="605">• TENSIONS.md: conflict log and decisions</text>
  </g>

  <!-- Core Contracts -->
  <g>
    <rect class="branch orange" x="120" y="830" rx="12" ry="12" width="360" height="54"/>
    <text class="label-branch" x="300" y="863" text-anchor="middle">Core Contracts</text>
    <path class="line orange" d="M 300 830 V 720"/>
    <rect class="leaf orange" x="75" y="660" rx="10" ry="10" width="450" height="135"/>
    <text class="label-leaf" x="100" y="690">• Never overwrite MANUAL_START...MANUAL_END</text>
    <text class="label-leaf" x="100" y="717">• load stdout is clean context only</text>
    <text class="label-leaf" x="100" y="744">• cli.py loops over REGISTRY</text>
    <text class="label-leaf" x="100" y="771">• parse_dir is non-recursive</text>
  </g>

  <!-- Parser Creation -->
  <g>
    <rect class="branch gold" x="610" y="85" rx="12" ry="12" width="380" height="54"/>
    <text class="label-branch" x="800" y="118" text-anchor="middle">Parser Creation Workflow</text>
    <path class="line gold" d="M 800 139 V 180"/>
    <rect class="leaf gold" x="560" y="180" rx="10" ry="10" width="480" height="150"/>
    <text class="label-leaf" x="585" y="210">• Use docs/prompts/add-parser.md</text>
    <text class="label-leaf" x="585" y="237">• Proposal first, human approval before code</text>
    <text class="label-leaf" x="585" y="264">• Probe tree-sitter AST node types</text>
    <text class="label-leaf" x="585" y="291">• Define bridge, scope, tests, tensions</text>
    <text class="label-leaf" x="585" y="318">• Add parser + one cli.py import line</text>
  </g>

  <!-- Architecture -->
  <g>
    <rect class="branch purple" x="1120" y="100" rx="12" ry="12" width="360" height="54"/>
    <text class="label-branch" x="1300" y="133" text-anchor="middle">Architecture</text>
    <path class="line purple" d="M 1300 154 V 195"/>
    <rect class="leaf purple" x="1080" y="195" rx="10" ry="10" width="440" height="150"/>
    <text class="label-leaf" x="1105" y="225">• schema.py: dataclasses, REGISTRY, markers</text>
    <text class="label-leaf" x="1105" y="252">• merger.py: render [auto], preserve [manual]</text>
    <text class="label-leaf" x="1105" y="279">• cli.py: build, load, watch</text>
    <text class="label-leaf" x="1105" y="306">• global_context.py: GLOBAL.md and stack index</text>
    <text class="label-leaf" x="1105" y="333">• parsers/*: ecosystem-specific AST extraction</text>
  </g>

  <!-- Parser Plugins -->
  <g>
    <rect class="branch teal" x="1140" y="385" rx="12" ry="12" width="360" height="54"/>
    <text class="label-branch" x="1320" y="418" text-anchor="middle">Parser Plugins</text>
    <path class="line teal" d="M 1320 439 V 480"/>
    <rect class="leaf teal" x="1090" y="480" rx="10" ry="10" width="460" height="170"/>
    <text class="label-leaf" x="1115" y="510">• Rust: pub functions, structs, tauri commands</text>
    <text class="label-leaf" x="1115" y="537">• TypeScript: exports, interfaces, TSX components</text>
    <text class="label-leaf" x="1115" y="564">• PHP: functions, classes, WordPress hooks</text>
    <text class="label-leaf" x="1115" y="591">• Future: Python, Go, Vue</text>
    <text class="label-leaf" x="1115" y="625">• Plugin owns skip dirs and ipc_label</text>
  </g>

  <!-- Known Gaps -->
  <g>
    <rect class="branch red" x="1120" y="840" rx="12" ry="12" width="360" height="54"/>
    <text class="label-branch" x="1300" y="873" text-anchor="middle">Known Gaps</text>
    <path class="line red" d="M 1300 840 V 730"/>
    <rect class="leaf red" x="1070" y="680" rx="10" ry="10" width="460" height="135"/>
    <text class="label-leaf" x="1095" y="710">• Python parser not implemented</text>
    <text class="label-leaf" x="1095" y="737">• Go parser not implemented</text>
    <text class="label-leaf" x="1095" y="764">• PyPI packaging missing</text>
    <text class="label-leaf" x="1095" y="791">• Manual staleness + multi-language dirs unresolved</text>
  </g>

  <!-- Agent Workflow / Operations -->
  <g>
    <rect class="branch slate" x="610" y="900" rx="12" ry="12" width="380" height="54"/>
    <text class="label-branch" x="800" y="933" text-anchor="middle">Agent Workflow</text>
    <path class="line slate" d="M 800 900 V 765"/>
    <rect class="leaf slate" x="555" y="660" rx="10" ry="10" width="490" height="175"/>
    <text class="label-leaf" x="580" y="690">• Read GLOBAL.md, module context, OPEN tensions</text>
    <text class="label-leaf" x="580" y="717">• Stop if [manual] is still template</text>
    <text class="label-leaf" x="580" y="744">• Write failing tests before code changes</text>
    <text class="label-leaf" x="580" y="771">• Record tensions before violating constraints</text>
    <text class="label-leaf" x="580" y="798">• Use Debian WSL wrapper: context-gen</text>
    <text class="label-leaf" x="580" y="825">• Wrapper activates ~/.venvs/context-mapping</text>
  </g>
</svg>
